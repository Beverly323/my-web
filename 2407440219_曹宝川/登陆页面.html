<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 | 关于我</title>
    <link rel="stylesheet" href="C:\Users\asus\Desktop\2407440219_曹宝川\2.css">
</head>
<body>
    <div class="login-container">
        <h2>Enter My World</h2>
        <form action="#" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">LOGIN</button>
        </form>
        <p class="back-link"><a href="主页面.html">← Back to Home</a></p>
    </div>

    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-container { width: 400px; padding: 50px 40px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; text-align: center; }
        .login-container h2 { margin-bottom: 40px; font-weight: 300; letter-spacing: 3px; }
        .form-group { margin-bottom: 25px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 12px; color: #888; }
        .form-group input { width: 100%; padding: 12px; background: #0f0f0f; border: 1px solid #444; color: #fff; border-radius: 4px; }
        button { width: 100%; padding: 15px; margin-top: 20px; background: var(--red-accent); color: #fff; border: none; font-size: 14px; letter-spacing: 2px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #a82f27; }
        .back-link { margin-top: 30px; font-size: 12px; }
        .back-link a { color: #666; }
    </style>
</body>
</html>
